name: Sign Firefox and Publish Update Channel

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Protected SemVer tag to sign (for example v0.2.8)
        required: true
        type: string

permissions: {}

concurrency:
  group: firefox-pages-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.3
          cache: npm
      - name: Verify immutable tag and source versions
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          node scripts/verify-release.js
          test "$(git describe --tags --exact-match HEAD)" = "$RELEASE_TAG"
      - run: npm ci --ignore-scripts
      - run: npm run verify
      - name: Create digest-bound signing and assembly inputs
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          rm -rf dist/signing-input dist/release-input
          mkdir -p dist/signing-input dist/release-input/scripts
          tar --sort=name --mtime='UTC 1980-01-01' --owner=0 --group=0 --numeric-owner \
            -czf dist/signing-input/signing-input.tgz node_modules dist/build/firefox
          (cd dist/signing-input && sha256sum signing-input.tgz > SHA256SUMS)
          cp dist/open-video-catcher-chrome-edge.zip dist/release-input/
          cp dist/open-video-catcher-firefox.zip dist/release-input/
          cp scripts/generate-update-manifest.js dist/release-input/scripts/
          node -e 'const fs=require("fs"); const value={tag:process.env.RELEASE_TAG,sourceCommit:require("child_process").execFileSync("git",["rev-parse","HEAD"],{encoding:"utf8"}).trim(),version:require("./package.json").version}; fs.writeFileSync("dist/release-input/SOURCE.json",JSON.stringify(value,null,2)+"\n")'
          (cd dist/release-input && sha256sum open-video-catcher-chrome-edge.zip open-video-catcher-firefox.zip scripts/generate-update-manifest.js SOURCE.json > SHA256SUMS)
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: firefox-signing-input-${{ inputs.tag }}
          path: dist/signing-input/
          if-no-files-found: error
          retention-days: 3
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-assembly-input-${{ inputs.tag }}
          path: dist/release-input/
          if-no-files-found: error
          retention-days: 3

  sign:
    needs: build
    runs-on: ubuntu-latest
    permissions: {}
    environment:
      name: amo-signing
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: firefox-signing-input-${{ inputs.tag }}
          path: signing-input
      - name: Verify and extract signing input
        run: |
          (cd signing-input && sha256sum -c SHA256SUMS)
          tar -xzf signing-input/signing-input.tgz
      - name: Sign exact Firefox source with AMO
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          test -n "$WEB_EXT_API_KEY" || { echo "Missing AMO_JWT_ISSUER" >&2; exit 1; }
          test -n "$WEB_EXT_API_SECRET" || { echo "Missing AMO_JWT_SECRET" >&2; exit 1; }
          mkdir -p signed
          ./node_modules/.bin/web-ext sign \
            --source-dir dist/build/firefox \
            --channel unlisted \
            --artifacts-dir signed \
            --api-key "$WEB_EXT_API_KEY" \
            --api-secret "$WEB_EXT_API_SECRET"
          mapfile -t SIGNED_FILES < <(find signed -maxdepth 1 -type f -name '*.xpi' -print)
          test "${#SIGNED_FILES[@]}" -eq 1 || { echo "Expected exactly one signed XPI, found ${#SIGNED_FILES[@]}" >&2; exit 1; }
          cp "${SIGNED_FILES[0]}" signed/open-video-catcher-firefox.xpi
          unzip -t signed/open-video-catcher-firefox.xpi
          (cd signed && sha256sum open-video-catcher-firefox.xpi > SHA256SUMS)
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: firefox-signed-${{ inputs.tag }}
          path: |
            signed/open-video-catcher-firefox.xpi
            signed/SHA256SUMS
          if-no-files-found: error
          retention-days: 3

  assemble:
    needs: [build, sign]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-assembly-input-${{ inputs.tag }}
          path: release-input
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: firefox-signed-${{ inputs.tag }}
          path: signed
      - name: Verify inputs and build public update channel
        run: |
          (cd release-input && sha256sum -c SHA256SUMS)
          (cd signed && sha256sum -c SHA256SUMS)
          mkdir -p release-input/public
          EXPECTED_VERSION="$(node -p "require('./release-input/SOURCE.json').version")" \
            EXPECTED_ADDON_ID=open-video-catcher@solitude0429.github.io \
            XPI_PATH=../signed/open-video-catcher-firefox.xpi \
            UPDATE_LINK=https://solitude0429.github.io/open-video-catcher/open-video-catcher-firefox.xpi \
            OUTPUT_PATH=public/updates.json \
            node release-input/scripts/generate-update-manifest.js
          cp signed/open-video-catcher-firefox.xpi release-input/public/
          cp release-input/open-video-catcher-chrome-edge.zip release-input/public/
          cp release-input/open-video-catcher-firefox.zip release-input/public/open-video-catcher-firefox-unsigned.zip
          cp release-input/SOURCE.json release-input/public/
          (cd release-input/public && sha256sum open-video-catcher-* updates.json SOURCE.json | sort -k2 > SHA256SUMS)
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: release-input/public
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: firefox-signed-update-channel-${{ inputs.tag }}
          path: release-input/public/
          if-no-files-found: error

  publish-release:
    needs: assemble
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: firefox-signed-update-channel-${{ inputs.tag }}
          path: public
      - name: Verify signed update-channel assets
        run: |
          (cd public && sha256sum -c SHA256SUMS)
          cp public/SHA256SUMS public/FIREFOX-UPDATE-SHA256SUMS
      - uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: public/SHA256SUMS
      - name: Publish signed Firefox assets without replacing existing bytes
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          read -r REF_TYPE REF_SHA < <(gh api "repos/$GH_REPO/git/ref/tags/$RELEASE_TAG" --jq '"\(.object.type) \(.object.sha)"')
          test "$REF_TYPE" = commit
          SOURCE_SHA="$(node -p "require('./public/SOURCE.json').sourceCommit")"
          test "$REF_SHA" = "$SOURCE_SHA"
          gh release view "$RELEASE_TAG" >/dev/null
          mkdir -p existing
          for asset in \
            open-video-catcher-chrome-edge.zip \
            open-video-catcher-firefox-unsigned.zip \
            open-video-catcher-firefox.xpi \
            updates.json \
            SOURCE.json \
            FIREFOX-UPDATE-SHA256SUMS; do
            if gh release download "$RELEASE_TAG" --pattern "$asset" --dir existing >/dev/null 2>&1; then
              cmp "existing/$asset" "public/$asset"
            else
              gh release upload "$RELEASE_TAG" "public/$asset"
            fi
          done

  deploy:
    needs: [assemble, publish-release]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
