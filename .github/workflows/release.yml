name: GitHub Release Assets

on:
  push:
    tags:
      - 'v*.*.*'

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.3
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Verify tag and all release metadata versions
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node scripts/verify-release.js
      - run: npm run verify
      - name: Create sorted release checksums
        run: |
          (cd dist && sha256sum open-video-catcher-chrome-edge.zip open-video-catcher-firefox.zip | sort -k2 > SHA256SUMS)
          (cd dist && sha256sum -c SHA256SUMS)
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-assets-${{ github.ref_name }}
          path: |
            dist/open-video-catcher-chrome-edge.zip
            dist/open-video-catcher-firefox.zip
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 7

  attest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-assets-${{ github.ref_name }}
          path: assets
      - run: (cd assets && sha256sum -c SHA256SUMS)
      - uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: assets/SHA256SUMS

  publish:
    needs: [build, attest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-assets-${{ github.ref_name }}
          path: assets
      - name: Verify and publish immutable release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          (cd assets && sha256sum -c SHA256SUMS)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists; refusing to mutate it: $RELEASE_TAG" >&2
            exit 1
          fi
          printf '%s\n' \
            '## Open Video Catcher' \
            '' \
            '- Chrome/Edge unsigned development ZIP' \
            '- Firefox unsigned development ZIP' \
            '- SHA256SUMS and GitHub artifact attestation' > release-notes.md
          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --notes-file release-notes.md \
            assets/open-video-catcher-chrome-edge.zip \
            assets/open-video-catcher-firefox.zip \
            assets/SHA256SUMS
